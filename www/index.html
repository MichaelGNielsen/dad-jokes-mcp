<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dad Jokes</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: #0d1117; color: #c9d1d9; min-height: 100vh;
  }
  .container { max-width: 800px; margin: 0 auto; padding: 2rem 1rem; }

  header {
    display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 1rem;
    margin-bottom: 1.5rem;
  }
  h1 { font-size: 1.5rem; color: #f0c040; }
  .stats { color: #8b949e; font-size: 0.875rem; }
  .stats span { color: #c9d1d9; font-weight: 600; }

  .controls {
    display: flex; gap: 0.5rem; flex-wrap: wrap; margin-bottom: 1rem;
  }
  .controls button, .controls select {
    padding: 0.5rem 1rem; border: 1px solid #30363d; border-radius: 6px;
    background: #21262d; color: #c9d1d9; cursor: pointer; font-size: 0.875rem;
  }
  .controls button:hover { background: #30363d; }
  .controls button.primary { background: #238636; border-color: #2ea043; }
  .controls button.primary:hover { background: #2ea043; }
  .controls input {
    flex: 1; min-width: 160px; padding: 0.5rem 0.75rem;
    border: 1px solid #30363d; border-radius: 6px;
    background: #0d1117; color: #c9d1d9; font-size: 0.875rem;
  }
  .ai-config {
    display: flex; gap: 0.5rem; margin-bottom: 1rem; align-items: center;
  }
  .ai-config input {
    flex: 1; padding: 0.5rem 0.75rem; border: 1px solid #30363d; border-radius: 6px;
    background: #0d1117; color: #c9d1d9; font-size: 0.875rem;
  }
  .ai-config label { font-size: 0.875rem; color: #8b949e; }
  .add-row {
    display: flex; gap: 0.5rem; margin-bottom: 1rem;
  }
  .add-row textarea {
    flex: 1; resize: vertical; min-height: 2.5rem; max-height: 6rem;
    padding: 0.5rem 0.75rem; border: 1px solid #30363d; border-radius: 6px;
    background: #0d1117; color: #c9d1d9; font-size: 0.875rem; font-family: inherit;
  }

  .joke-list { list-style: none; display: flex; flex-direction: column; gap: 0.5rem; }
  .joke-list li {
    background: #161b22; border: 1px solid #30363d; border-radius: 8px;
    padding: 0.75rem 1rem; font-size: 0.9375rem; line-height: 1.5;
    white-space: pre-wrap; position: relative;
  }
  .btn-delete {
    position: absolute; top: 0.5rem; right: 0.5rem;
    background: transparent; border: none; color: #484f58;
    cursor: pointer; font-size: 1.25rem; line-height: 1;
    padding: 0.25rem; border-radius: 4px;
    display: flex; align-items: center; justify-content: center;
    transition: color 0.2s, background 0.2s;
  }
  .btn-delete:hover { color: #f85149; background: #da363311; }
  .joke-list li .tag {
    display: inline-block; font-size: 0.7rem; font-weight: 600; text-transform: uppercase;
    padding: 0.15rem 0.5rem; border-radius: 99px; margin-right: 0.5rem;
  }
  .tag-programming { background: #1f6feb22; color: #58a6ff; border: 1px solid #1f6feb44; }
  .tag-chuck { background: #da363322; color: #ff7b72; border: 1px solid #da363344; }
  .tag-dad { background: #23863622; color: #3fb950; border: 1px solid #23863644; }
  .tag-general { background: #21262d; color: #8b949e; border: 1px solid #30363d; }
  .tag-none { background: #21262d22; color: #484f58; border: 1px solid #21262d44; }

  .empty { text-align: center; color: #484f58; padding: 3rem 1rem; font-size: 1rem; }
  .toast {
    position: fixed; bottom: 1.5rem; right: 1.5rem;
    background: #238636; color: #fff; padding: 0.75rem 1.25rem; border-radius: 8px;
    font-size: 0.875rem; opacity: 0; transition: opacity 0.3s; pointer-events: none;
  }
  .toast.error { background: #da3633; }
  .toast.show { opacity: 1; }
</style>
</head>
<body>
<div class="container">
  <header>
    <h1>😄 Dad Jokes</h1>
    <div class="stats"><span id="count">0</span> jokes in pool</div>
  </header>

  <div class="controls">
    <input type="text" id="search" placeholder="Search jokes..." autocomplete="off">
    <select id="category">
      <option value="">All categories</option>
      <option value="programming">Programming</option>
      <option value="chuck">Chuck Norris</option>
      <option value="dad">Dad</option>
      <option value="general">General</option>
    </select>
    <button class="primary" id="btn-random">🎲 Random</button>
    <button class="primary" id="btn-batch">➕ Add 5</button>
    <button id="btn-clear">🗑 Clear</button>
    <button id="btn-clean">🧹 Clean</button>
    <button id="btn-refresh">🔄</button>
  </div>

  <div class="ai-config">
    <label for="ai-url">AI GW:</label>
    <input type="text" id="ai-url" placeholder="AI Gateway URL..." value="http://nuc5:4042/v1/chat/completions">
    <button id="btn-set-ai">Set URL</button>
  </div>

  <div class="add-row">
    <textarea id="joke-input" placeholder="Write your own joke..." rows="1"></textarea>
    <button class="primary" id="btn-add-joke">➕ Add</button>
  </div>

  <ul class="joke-list" id="joke-list"></ul>
  <div class="empty" id="empty">No jokes yet. Click 🎲 Random to fetch one!</div>
</div>
<div class="toast" id="toast"></div>

<script>
const MCP = "/mcp";

let allJokes = [];
let filterText = "";
let filterCategory = "";

const CATEGORY_RULES = [
  { name: "chuck",    match: /chuck\s*norris/i },
  { name: "dad",      match: /(dad|why did the|what do you call|knock knock|a man walks|walked into a)/i },
  { name: "programming", match: /(code|bug|programmer|computer|javascript|html|css|python|java|ruby|function|variable|server|database|linux|windows|apple|google|algorithm|developer|syntax|object|class|api|json|git)/i },
];

function classify(joke) {
  for (const r of CATEGORY_RULES) {
    if (r.match.test(joke)) return r.name;
  }
  return "general";
}

async function mcp(method, params = {}) {
  const res = await fetch(MCP, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ jsonrpc: "2.0", id: 1, method, params }),
  });
  const data = await res.json();
  if (data.error) throw new Error(data.error.message);
  return data.result;
}

async function loadJokes() {
  try {
    const result = await mcp("tools/call", { name: "get_all_jokes", arguments: {} });
    const text = result.content[0].text;
    if (text.startsWith("No jokes")) {
      allJokes = [];
    } else {
      allJokes = JSON.parse(text);
    }
    render();
  } catch (e) {
    toast("Failed to load jokes: " + e.message, true);
  }
}

function render() {
  const filtered = allJokes.filter(j => {
    const jokeText = typeof j === 'string' ? j : j.text;
    if (filterCategory && classify(jokeText) !== filterCategory) return false;
    if (filterText && !jokeText.toLowerCase().includes(filterText.toLowerCase())) return false;
    return true;
  });

  document.getElementById("count").textContent = allJokes.length;
  const list = document.getElementById("joke-list");
  const empty = document.getElementById("empty");

  if (filtered.length === 0) {
    list.innerHTML = "";
    empty.style.display = "block";
    return;
  }
  empty.style.display = "none";
  list.innerHTML = filtered.map(j => {
    const jokeText = typeof j === 'string' ? j : j.text;
    const heading = typeof j === 'string' ? 'Dad Joke' : j.heading;
    const tag = classify(jokeText);
    const body = escapeHtml(jokeText);
    const head = escapeHtml(heading);
    const safeText = encodeURIComponent(jokeText);
    return `<li>
      <button class="btn-delete" title="Delete joke" onclick="deleteJoke('${safeText}')">×</button>
      <div style="margin-bottom: 0.25rem; display: flex; align-items: center; gap: 0.5rem; flex-wrap: wrap; padding-right: 2rem;">
        <span style="font-weight: bold; color: #f0c040;">${head}</span>
        <span style="color: #484f58;">|</span>
        <span class="tag tag-${tag}">${tag}</span>
      </div>
      <div>${body}</div>
    </li>`;
  }).join("");
}

async function deleteJoke(encodedText) {
  const text = decodeURIComponent(encodedText);
  if (!confirm("Delete this joke?")) return;
  try {
    const result = await mcp("tools/call", { name: "delete_joke", arguments: { text } });
    toast(result.content[0].text);
    await loadJokes();
  } catch (e) {
    toast("Error: " + e.message, true);
  }
}

function escapeHtml(s) {
  const d = document.createElement("div");
  d.textContent = s;
  return d.innerHTML;
}

async function fetchRandom() {
  try {
    const result = await mcp("tools/call", { name: "get_random_joke", arguments: {} });
    const text = result.content[0].text;
    toast(text.replace("😄 ", ""));
    await loadJokes();
  } catch (e) {
    toast("Error: " + e.message, true);
  }
}

async function batchAdd(n = 5) {
  try {
    const result = await mcp("tools/call", { name: "add_jokes", arguments: { count: n } });
    const text = result.content[0].text;
    toast(text.substring(0, 80) + (text.length > 80 ? "…" : ""));
    await loadJokes();
  } catch (e) {
    toast("Error: " + e.message, true);
  }
}

async function clearJokes() {
  if (!confirm("Clear all jokes?")) return;
  try {
    await mcp("tools/call", { name: "clear_jokes", arguments: {} });
    toast("Cleared all jokes");
    await loadJokes();
  } catch (e) {
    toast("Error: " + e.message, true);
  }
}

async function cleanJokes() {
  try {
    const result = await mcp("tools/call", { name: "clean_jokes", arguments: {} });
    toast(result.content[0].text);
    await loadJokes();
  } catch (e) {
    toast("Error: " + e.message, true);
  }
}

async function addCustomJoke() {
  const input = document.getElementById("joke-input");
  const text = input.value.trim();
  if (!text) return;
  try {
    const result = await mcp("tools/call", { name: "add_joke", arguments: { text } });
    toast(result.content[0].text);
    input.value = "";
    await loadJokes();
  } catch (e) {
    toast("Error: " + e.message, true);
  }
}

function toast(msg, isError = false) {
  const el = document.getElementById("toast");
  el.textContent = msg;
  el.className = "toast" + (isError ? " error" : "") + " show";
  setTimeout(() => el.classList.remove("show"), 3000);
}

async function setAiUrl() {
  const url = document.getElementById("ai-url").value.trim();
  if (!url) return;
  try {
    const result = await mcp("tools/call", { name: "set_ai_gateway", arguments: { url } });
    toast(result.content[0].text);
  } catch (e) {
    toast("Error: " + e.message, true);
  }
}

document.getElementById("search").addEventListener("input", e => {
  filterText = e.target.value;
  render();
});
document.getElementById("category").addEventListener("change", e => {
  filterCategory = e.target.value;
  render();
});
document.getElementById("btn-random").addEventListener("click", fetchRandom);
document.getElementById("btn-batch").addEventListener("click", () => batchAdd(5));
document.getElementById("btn-clear").addEventListener("click", clearJokes);
document.getElementById("btn-clean").addEventListener("click", cleanJokes);
document.getElementById("btn-refresh").addEventListener("click", loadJokes);
document.getElementById("btn-set-ai").addEventListener("click", setAiUrl);
document.getElementById("btn-add-joke").addEventListener("click", addCustomJoke);
document.getElementById("joke-input").addEventListener("keydown", e => {
  if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); addCustomJoke(); }
});

loadJokes();
</script>
</body>
</html>
