version: '3.8'

services:
  dad-jokes-mcp:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: dad-jokes-mcp-server
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
